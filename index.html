<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IntraQueer" />
  <meta name="theme-color" content="#EDF1F4" />
  <link rel="apple-touch-icon" href="лого застосунку.PNG" />
  <link rel="icon" type="image/png" href="лого застосунку.PNG" />
  <title>IntraQueer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Montserrat+Alternates:wght@600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* ── Copied verbatim from src/index.css ─────────────────────────────────── */
    :root {
      --font-font-family-Montserrat:            "Montserrat", sans-serif;
      --font-font-family-Montserrat-Alternates: "Montserrat Alternates", sans-serif;

      --font-font-size-weather:   96px;
      --h1-font-size:             60px;
      --h2-font-size:             36px;
      --subtitle1-font-size:      32px;
      --subtitle2-font-size:      24px;
      --font-font-size-sm:        18px;
      --body2-font-size:          14px;
      --description-font-size:    10px;

      --weather-line-height:      104px;
      --h1-line-height:            72px;
      --h2-line-height:            48px;
      --subtitle1-line-height:     36px;
      --subtitle2-line-height:     32px;
      --font-line-height-s:        24px;
      --body2-line-height:         20px;
      --description-line-height:   16px;

      --text-basic:   #2C0005;
      --color-primary:   #2C0005;
      --color-secondary: #387C96;
      --color-neutral:   #EDF1F4;
      --color-warning:   #FFE166;
      --color-slate-dark: #312527;
      --radius-ios:       40px;
      --radius-ios-inner: 32px;
    }

    /* Hide scrollbars globally */
    *::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
    * { -ms-overflow-style: none !important; scrollbar-width: none !important; box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-font-family-Montserrat);
      background: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── iPhone frame ───────────────────────────────────────────────────────── */
    .iphone-frame {
      position: relative;
      width: 320px;
      height: 650px;
      background: #ffffff;
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
      overflow: hidden;
      border: 8px solid #1e293b;
      flex-shrink: 0;
    }

    .iphone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 128px;
      height: 24px;
      background: #1e293b;
      border-radius: 0 0 16px 16px;
      z-index: 50;
    }

    @media (max-width: 500px) {
      body {
        padding: 0;
        background: #EDF1F4;
        align-items: flex-start;
      }
      .iphone-frame {
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border: none;
        box-shadow: none;
        font-size: clamp(13px, 3.5vw, 16px);
      }
      .iphone-notch { display: none; }
      .status-bar   { display: none !important; }
      .home-indicator { display: none; }
      #app { font-size: clamp(13px, 3.5vw, 16px); }
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 40;
      pointer-events: none;
    }
    .status-time {
      font-size: 10px;
      font-weight: 700;
      color: #1e293b;
      padding-left: 4px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-right: 4px;
    }
    .battery-bar  { width: 12px; height: 6px; background: #1e293b; border-radius: 2px; }
    .signal-dot   { width: 6px;  height: 6px; background: #1e293b; border-radius: 50%; }

    .home-indicator {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 96px;
      height: 4px;
      background: #cbd5e1;
      border-radius: 9999px;
      z-index: 40;
    }

    /* ── Screen content area ────────────────────────────────────────────────── */
    .screen-content {
      position: absolute;
      inset: 0;
      padding-top: 32px;
      overflow-y: auto;
      background: #EDF1F4;
    }

    /* ── App mount point ────────────────────────────────────────────────────── */
    #app {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="iphone-frame">
    <div class="iphone-notch"></div>

    <div class="status-bar">
      <span class="status-time">9:41</span>
      <div class="status-icons">
        <div class="battery-bar"></div>
        <div class="signal-dot"></div>
      </div>
    </div>

    <div class="screen-content">
      <div id="app"></div>
    </div>

    <!-- PanicBtn lives here, outside scroll, always on top -->
    <div id="panic-slot" style="position:absolute;top:34px;right:12px;z-index:40;pointer-events:auto;"></div>
    <!-- BottomNav lives here, outside the scrollable area -->
    <div id="nav-slot" style="position:absolute;bottom:10px;left:10px;right:10px;z-index:50;"></div>

    <div class="home-indicator"></div>
  </div>

  <style>
    /* ── Onboarding shared layout ───────────────────────────────────────────── */
    .ob-screen {
      position: absolute;
      inset: 0;
      background: #EEF3F6;
      padding: 56px 16px 32px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
      animation: fadeIn 200ms ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .btn-primary {
      width: 100%;
      background: #ACDEF7;
      color: #2C0005;
      border: none;
      border-bottom: 2px solid #82CBEF;
      border-radius: 16px;
      padding: 12px 0;
      font-family: var(--font-font-family-Montserrat);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(172,222,247,0.4);
      transition: transform 0.1s, background 0.1s;
    }
    .btn-primary:hover  { background: #97D4F2; }
    .btn-primary:active { transform: scale(0.99); }

    .identity-card {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border-radius: 24px;
      border: 2px solid transparent;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      font-family: var(--font-font-family-Montserrat);
    }
    .identity-card.selected {
      background: #e0f0ff;
      border-color: #BBE2F3;
    }
    .identity-card .ic-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #717680;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .identity-card.selected .ic-icon { background: #5CC2E9; }
    .identity-card h3 { margin: 0 0 4px; font-size: 16px; font-weight: 700; color: #1C1A1A; }
    .identity-card p  { margin: 0; font-size: 13px; font-weight: 500; color: #5A6372; }
  </style>

  <script>
    /* ── State ──────────────────────────────────────────────────────────────── */
    let currentScreen = 'welcome';
    let history       = [];
    let selectedMode  = 'open';   // 'anonymous' | 'open'
    window.userMode   = 'anonymous'; // set to 'open' after register/login completes
    window.educationProgress = 0; // education hub progress (0-100%)

    /* ── Router ─────────────────────────────────────────────────────────────── */
    function navigate(name) {
      // Save form state before re-rendering
      const inputs = document.querySelectorAll('#app input, #app textarea');
      window.formCache = window.formCache || {};
      inputs.forEach(el => { if(el.id) window.formCache[el.id] = el.value; });

      history.push(currentScreen);
      currentScreen = name;
      render();
    }

    function goBack() {
      if (history.length === 0) return;
      currentScreen = history.pop();
      render();
    }

    /* ── Screens ─────────────────────────────────────────────────────────────── */
    function screenWelcome() {
      return `
        <div class="ob-screen" style="text-align:center;">
          <div></div>

          <div style="display:flex;flex-direction:column;align-items:center;gap:0;padding:0 8px;">
            <h1 style="font-size:24px;font-weight:800;color:#2C0005;margin:0 0 16px;line-height:1.2;">
              Вітаємо в IntraQueer
            </h1>
            <p style="font-size:14px;font-weight:600;color:rgba(44,0,5,0.7);max-width:270px;line-height:1.5;margin:0;">
              Твій безпечний простір для навчання, спілкування та захисту
            </p>

            <img src="Онбординг.webp" alt="" style="width:160px; object-fit:contain; display:block; margin:0 auto;">
          </div>

          <button class="btn-primary" onclick="navigate('identity')">Почати</button>
        </div>`;
    }

    function screenIdentity() {
      const anonSel = selectedMode === 'anonymous' ? 'selected' : '';
      const openSel = selectedMode === 'open'      ? 'selected' : '';
      return `
        <div class="ob-screen">
          <div>
            <h1 style="font-size:24px;font-weight:700;color:#1C1A1A;margin:0 0 8px;line-height:1.3;">
              Оберіть режим<br>ідентифікації
            </h1>
            <p style="font-size:14px;font-weight:500;color:#5A6372;margin:0 0 32px;max-width:300px;line-height:1.5;">
              Це визначить, як вас бачитимуть інші учасники спільноти
            </p>

            <div style="display:flex;flex-direction:column;gap:16px;">
              <button class="identity-card ${anonSel}" onclick="selectMode('anonymous')">
                <div class="ic-icon">
                  <i data-lucide="eye-off" style="width:20px;height:20px;"></i>
                </div>
                <div>
                  <h3>Анонімний</h3>
                  <p>Ви приховані для всіх. Тільки перегляд</p>
                </div>
              </button>

              <button class="identity-card ${openSel}" onclick="selectMode('open')">
                <div class="ic-icon">
                  <i data-lucide="eye" style="width:20px;height:20px;"></i>
                </div>
                <div>
                  <h3>Відкритий</h3>
                  <p>Повна взаємодія зі спільнотою</p>
                </div>
              </button>
            </div>
          </div>

          <button class="btn-primary" onclick="
            if (selectedMode === 'anonymous') {
              window.userMode = 'anonymous';
              navigate('security');
            } else {
              navigate('register');
            }
          ">Обрати</button>
        </div>`;
    }

    function screenRegister() {
      const v = window._regVals = window._regVals || { name:'', email:'', pass:'', agreed:false };
      const ok = v.name.trim() && v.email.trim() && v.pass.trim() && v.agreed;
      return `
        <div class="ob-screen">
          <div>
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;">
              <button onclick="goBack()" style="width:40px;height:40px;border-radius:50%;
                border:1px solid #CEEEFC;background:#fff;cursor:pointer;display:flex;
                align-items:center;justify-content:center;flex-shrink:0;">
                <i data-lucide="chevron-left" style="width:20px;height:20px;color:#2C0005;"></i>
              </button>
              <span style="font-size:18px;font-weight:700;color:#1C1A1A;">Вибір режиму</span>
            </div>
            <h1 style="font-size:24px;font-weight:800;color:#1C1A1A;margin:0 0 6px;">Створити акаунт</h1>
            <p style="font-size:14px;font-weight:500;color:#5A6372;margin:0 0 24px;">Приєднуйтесь до нашої безпечної спільноти</p>

            <div style="display:flex;flex-direction:column;gap:16px;">
              <div>
                <label style="display:block;font-size:14px;font-weight:700;color:rgba(28,26,26,0.8);margin-bottom:6px;padding-left:4px;">Ваше ім'я</label>
                <input id="reg-name" type="text" placeholder="Анна зірочка)" value="${v.name}"
                  oninput="window._regVals.name=this.value;renderReg()"
                  style="width:100%;background:#fff;padding:14px 20px;border-radius:20px;border:1px solid transparent;
                         font-size:15px;font-weight:500;color:#1C1A1A;font-family:var(--font-font-family-Montserrat);
                         outline:none;transition:border-color 0.15s;"
                  onfocus="this.style.borderColor='#ACDEF7'" onblur="this.style.borderColor='transparent'">
              </div>
              <div>
                <label style="display:block;font-size:14px;font-weight:700;color:rgba(28,26,26,0.8);margin-bottom:6px;padding-left:4px;">Електронна пошта</label>
                <input id="reg-email" type="email" placeholder="gmail.com" value="${v.email}"
                  oninput="window._regVals.email=this.value;renderReg()"
                  style="width:100%;background:#fff;padding:14px 20px;border-radius:20px;border:1px solid transparent;
                         font-size:15px;font-weight:500;color:#1C1A1A;font-family:var(--font-font-family-Montserrat);
                         outline:none;transition:border-color 0.15s;"
                  onfocus="this.style.borderColor='#ACDEF7'" onblur="this.style.borderColor='transparent'">
              </div>
              <div>
                <label style="display:block;font-size:14px;font-weight:700;color:rgba(28,26,26,0.8);margin-bottom:6px;padding-left:4px;">Пароль</label>
                <input id="reg-pass" type="password" placeholder="Мін. 8 символів" value="${v.pass}"
                  oninput="window._regVals.pass=this.value;renderReg()"
                  style="width:100%;background:#fff;padding:14px 20px;border-radius:20px;border:1px solid transparent;
                         font-size:15px;font-weight:500;color:#1C1A1A;font-family:var(--font-font-family-Montserrat);
                         outline:none;transition:border-color 0.15s;"
                  onfocus="this.style.borderColor='#ACDEF7'" onblur="this.style.borderColor='transparent'">
              </div>
              <div style="display:flex;align-items:flex-start;gap:12px;padding:0 4px;">
                <button onclick="window._regVals.agreed=!window._regVals.agreed;renderReg()"
                  style="width:24px;height:24px;min-width:24px;border-radius:6px;border:1px solid ${v.agreed?'#82CBEF':'#cbd5e1'};
                         background:${v.agreed?'#ACDEF7':'#fff'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                  ${v.agreed ? '<i data-lucide="check" style="width:14px;height:14px;color:#2C0005;stroke-width:3;"></i>' : ''}
                </button>
                <p style="font-size:11.5px;font-weight:600;color:#5A6372;line-height:1.55;margin:0;">
                  Я погоджуюсь з <strong style="color:#1C1A1A;">Правилами спільноти</strong> та обіцяю підтримувати безпечну атмосферу
                </p>
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;">
            <button onclick="${ok ? "window.userMode='open';navigate('security')" : ''}"
              style="width:100%;padding:12px 0;border-radius:16px;font-size:15px;font-weight:700;
                     font-family:var(--font-font-family-Montserrat);cursor:${ok?'pointer':'not-allowed'};
                     border:none;border-bottom:${ok?'2px solid #82CBEF':'0'};
                     background:${ok?'#ACDEF7':'#E4E2E2'};color:${ok?'#2C0005':'#8E8E93'};
                     box-shadow:${ok?'0 4px 12px rgba(172,222,247,0.4)':'none'};">
              Створити акаунт
            </button>
            <p style="text-align:center;font-size:13.5px;font-weight:600;color:#5A6372;margin:0;">
              Маєте вже акаунт?
              <button onclick="navigate('login')" style="background:none;border:none;font-size:13.5px;font-weight:800;color:#1C1A1A;cursor:pointer;padding:0;">Увійти</button>
            </p>
          </div>
        </div>`;
    }

    function screenLogin() {
      const v = window._loginVals = window._loginVals || { email:'', pass:'' };
      const ok = v.email.trim() && v.pass.trim();
      return `
        <div class="ob-screen">
          <div>
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;">
              <button onclick="goBack()" style="width:40px;height:40px;border-radius:50%;
                border:1px solid #CEEEFC;background:#fff;cursor:pointer;display:flex;
                align-items:center;justify-content:center;flex-shrink:0;">
                <i data-lucide="chevron-left" style="width:20px;height:20px;color:#2C0005;"></i>
              </button>
              <span style="font-size:18px;font-weight:700;color:#1C1A1A;">Вибір режиму</span>
            </div>
            <h1 style="font-size:24px;font-weight:800;color:#1C1A1A;margin:0 0 6px;">З поверненням</h1>
            <p style="font-size:14px;font-weight:500;color:#5A6372;margin:0 0 24px;">Введіть ваші дані для входу в систему</p>

            <div style="display:flex;flex-direction:column;gap:16px;">
              <div>
                <label style="display:block;font-size:14px;font-weight:700;color:rgba(28,26,26,0.8);margin-bottom:6px;padding-left:4px;">Електронна пошта</label>
                <input type="email" placeholder="gmail.com" value="${v.email}"
                  oninput="window._loginVals.email=this.value;renderLogin()"
                  style="width:100%;background:#fff;padding:14px 20px;border-radius:20px;border:1px solid transparent;
                         font-size:15px;font-weight:500;color:#1C1A1A;font-family:var(--font-font-family-Montserrat);
                         outline:none;transition:border-color 0.15s;"
                  onfocus="this.style.borderColor='#ACDEF7'" onblur="this.style.borderColor='transparent'">
              </div>
              <div>
                <label style="display:block;font-size:14px;font-weight:700;color:rgba(28,26,26,0.8);margin-bottom:6px;padding-left:4px;">Пароль</label>
                <input type="password" placeholder="Мін. 8 символів" value="${v.pass}"
                  oninput="window._loginVals.pass=this.value;renderLogin()"
                  style="width:100%;background:#fff;padding:14px 20px;border-radius:20px;border:1px solid transparent;
                         font-size:15px;font-weight:500;color:#1C1A1A;font-family:var(--font-font-family-Montserrat);
                         outline:none;transition:border-color 0.15s;"
                  onfocus="this.style.borderColor='#ACDEF7'" onblur="this.style.borderColor='transparent'">
              </div>
              <div style="text-align:right;padding-right:4px;">
                <button style="background:none;border:none;font-size:13.5px;font-weight:800;color:#1C1A1A;cursor:pointer;">Забули пароль?</button>
              </div>
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;">
            <button onclick="${ok ? "navigate('security')" : ''}"
              style="width:100%;padding:12px 0;border-radius:16px;font-size:15px;font-weight:700;
                     font-family:var(--font-font-family-Montserrat);cursor:${ok?'pointer':'not-allowed'};
                     border:none;border-bottom:${ok?'2px solid #82CBEF':'0'};
                     background:${ok?'#ACDEF7':'#E4E2E2'};color:${ok?'#2C0005':'#8E8E93'};
                     box-shadow:${ok?'0 4px 12px rgba(172,222,247,0.4)':'none'};">
              Увійти
            </button>
            <p style="text-align:center;font-size:13.5px;font-weight:600;color:#5A6372;margin:0;">
              Немає акаунту?
              <button onclick="navigate('register')" style="background:none;border:none;font-size:13.5px;font-weight:800;color:#1C1A1A;cursor:pointer;padding:0;">Зареєструватись</button>
            </p>
          </div>
        </div>`;
    }

    function screenSecurity() {
      const d = window._secVals = window._secVals || { disguise: 'original', panic: true };
      return `
        <div class="ob-screen" style="overflow-y:auto;">
          <div>
            <h1 style="font-size:24px;font-weight:800;color:#1C1A1A;margin:0 0 6px;">Налаштування безпеки</h1>
            <p style="font-size:14px;font-weight:500;color:#5A6372;margin:0 0 24px;line-height:1.5;">Налаштуйте інструменти миттєвого захисту</p>

            <p style="font-size:12px;font-weight:800;color:#5A6372;text-transform:uppercase;letter-spacing:0.08em;margin:0 0 10px 4px;">Маскування додатка</p>

            <!-- Card 1: Оригінальна іконка -->
            <div id="disguise-original" onclick="selectDisguise('original')" style="width:100%;background:${d.disguise==='original'?'#F4FAFE':'white'};border-radius:16px;padding:12px 14px;border:2px solid ${d.disguise==='original'?'#ACDEF7':'transparent'};margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;">
              <img src="лого застосунку.PNG" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;" onerror="this.style.background='#ACDEF7';this.style.display='flex';">
              <div style="display:none;width:44px;height:44px;border-radius:10px;flex-shrink:0;background:#ACDEF7;align-items:center;justify-content:center;">
                <i data-lucide="shield" style="width:22px;height:22px;color:#2C0005;"></i>
              </div>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:700;color:#1C1A1A;">Оригінальна іконка</div>
                <div style="font-size:10px;color:#5A6372;margin-top:2px;">Використовувати звичайну іконку застосунку</div>
              </div>
              <div id="radio-original" style="width:20px;height:20px;border-radius:50%;border:2px solid ${d.disguise==='original'?'#5CC2E9':'#e2e8f0'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">

      window.savedArticlesList = (window.savedArticlesList || SAVED_ARTICLES_DATA).filter((_, i) => i !== index);

      { title: 'Права ЛГБТК+ в Україні 2024', tag: 'Право', readTime: '8 хв', color: '#C097F2' },

                 transition:border-color 0.2s;">

    function selectIdentityCard(mode) {
      document.querySelectorAll('.identity-card').forEach(c => {
        c.style.borderColor = 'transparent';
        c.style.background = '#fff';
        const icon = c.querySelector('.identity-icon');
        if (icon) icon.style.background = '#94a3b8';
      });
      const selected = document.getElementById('card-' + mode);
      if (selected) {
        selected.style.borderColor = '#ACDEF7';
        selected.style.background = '#F4FAFE';
        const icon = selected.querySelector('.identity-icon');
        if (icon) icon.style.background = '#5CC2E9';
      }
      window.identityChoice = mode;
    }

    function confirmIdentity() {
      if (window.identityChoice === 'anonymous') {
        window.userMode = 'anonymous';
        navigate('security');
      } else if (window.identityChoice === 'open') {
        window.userMode = 'open';
        navigate('register');
      }
    }

    /* ── Like & Comment helpers ──────────────────────────────────────────────── */
    function toggleLike(btn, postId) {
      if(window.userMode !== 'open') {
        showAnonModal('Ви не можете ставити реакції в анонімному режимі');
        return;
      }
      const liked = btn.dataset.liked === 'true';
      btn.dataset.liked = !liked;
      const icon = btn.querySelector('i');
      const count = btn.querySelector('span');
      if(!liked) {
        icon.style.fill = '#ef4444';
        icon.style.color = '#ef4444';
        count.textContent = parseInt(count.textContent) + 1;
      } else {
        icon.style.fill = 'none';
        icon.style.color = '#94a3b8';
        count.textContent = parseInt(count.textContent) - 1;
      }
      lucide.createIcons();
    }

      overlay.innerHTML = `

    function rerenderCal() {
      const el = document.getElementById('cal-widget');
      if (el) {

        lucide.createIcons({ rootElement: el });
      }
    }

    function renderEvents() {
      const pills = ['Всі','Онлайн','Офлайн','Безкоштовно'];

        const active = _eventsPill === p;
        return `<button onclick="_eventsPill='${p}';render()"
          style="border-radius:99px;font-size:10px;font-weight:700;padding:5px 12px;cursor:pointer;
                 white-space:nowrap;flex-shrink:0;font-family:var(--font-font-family-Montserrat);
                 border:${active?'none':'1px solid #e2e8f0'};
                 background:${active?'#ACDEF7':'white'};color:${active?'#2C0005':'#64748b'};">${p}</button>`;
      }).join('');

      const selectedCity = window.selectedCity || 'Всі міста';
      const visible = EVENTS.filter(ev => {
        const matchSearch = ev.title.toLowerCase().includes(_eventsSearch.toLowerCase());
        if (!matchSearch) return false;
        if (_eventsPill === 'Онлайн') return ev.format === 'Онлайн';
        if (_eventsPill === 'Офлайн') return ev.format === 'Офлайн';
        if (selectedCity !== 'Всі міста') {
          let city = 'Онлайн';
          if (ev.format === 'Офлайн') {
            if (ev.location.includes('Львів')) city = 'Львів';
            else if (ev.location.includes('Київ')) city = 'Київ';
            else if (ev.location.includes('Харків')) city = 'Харків';
            else if (ev.location.includes('Одеса')) city = 'Одеса';
          }
          if (city !== selectedCity) return false;
        }
        return true;
      });

      const tabBar = `
        <div style="display:flex;background:white;border-radius:99px;padding:3px;
                    margin-bottom:14px;width:100%;">
          ${[['nearest','Найближчі'],['calendar','Календар']].map(([id,label]) => {
            const active = _eventsTab === id;
            return `<button onclick="_eventsTab='${id}';render()"
              style="flex:1;text-align:center;border-radius:99px;padding:7px;border:none;cursor:pointer;
                     font-size:12px;font-family:var(--font-font-family-Montserrat);font-weight:700;
                     background:${active?'#ACDEF7':'transparent'};
                     color:${active?'#2C0005':'#64748b'};">${label}</button>`;
          }).join('')}
        </div>`;

      const listContent = _eventsTab === 'nearest'
        ? (visible.map(ev => eventCard(ev, EVENTS.indexOf(ev))).join('') ||
           '<div style="text-align:center;padding:30px 0;font-size:13px;color:#94a3b8;">Немає подій</div>')
        : `<div id="cal-widget">${buildCalendarWidget()}</div>`;

      return wrapScreen(`

          <div style="position:relative;margin-bottom:12px;">
            <i data-lucide="search"
               style="position:absolute;left:12px;top:50%;transform:translateY(-50%);
                      width:15px;height:15px;color:#94a3b8;pointer-events:none;"></i>
            <input type="text" placeholder="Пошук серед подій"
              value="${_eventsSearch}"
              oninput="_eventsSearch=this.value;render()"
              onfocus="this.style.border='1px solid #ACDEF7';this.style.boxShadow='0 0 0 3px rgba(172,222,247,0.3)'"
              onblur="this.style.border='1px solid #e2e8f0';this.style.boxShadow='none'"
              style="width:100%;height:38px;background:#fff;border-radius:50px;
                     border:1px solid #e2e8f0;padding:0 14px 0 36px;
                     font-size:13px;font-family:var(--font-font-family-Montserrat);
                     color:#374151;outline:none;box-sizing:border-box;transition:border 0.15s,box-shadow 0.15s;">
          </div>

          <div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 6px 0;margin:0 -14px;padding-left:14px;
                      -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;">
            ${pillsHTML}
            <div style="flex-shrink:0;width:14px;"></div>
          </div>

          ${tabBar}

          <div style="display:flex;gap:6px;overflow-x:auto;padding:0 16px 6px 0;margin:0 -14px;padding-left:14px;
                      -webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;margin-bottom:14px;">
            ${['Всі міста','Львів','Київ','Харків','Одеса','Онлайн'].map(city => {
              const active = (window.selectedCity || 'Всі міста') === city;
              return `<button data-city-filter-btn onclick="selectCity(this,'${city}')"
                style="border-radius:99px;font-size:10px;font-weight:700;padding:5px 12px;cursor:pointer;
                       white-space:nowrap;flex-shrink:0;font-family:var(--font-font-family-Montserrat);
                       border:${active?'none':'1px solid #e2e8f0'};
                       background:${active?'#1C1A1A':'white'};color:${active?'white':'#64748b'};">${city}</button>`;
            }).join('')}

          </div>

          <button onclick="navigate('new-event')"
            style="width:100%;background:white;border:1px solid #ACDEF7;border-radius:14px;
                   padding:10px 14px;margin-bottom:14px;cursor:pointer;display:grid;
                   grid-template-columns:24px 1fr 24px;align-items:center;gap:0;
                   font-family:var(--font-font-family-Montserrat);">
            <i data-lucide="plus-circle" style="width:16px;height:16px;color:#ACDEF7;justify-self:center;"></i>
            <span style="font-size:13px;font-weight:700;color:#2C0005;text-align:center;">Запропонувати подію</span>
            <div></div>
          </button>

          ${listContent}
      `, 'home', { header:`${backBtn('home')}<span style="font-size:16px;font-weight:700;color:#1C1A1A;">Події</span>` });
    }
    screens['events'] = renderEvents;

    function closeEventSheet() { _eventSheet = null; _eventReport = false; _eventReportSelected = null; render(); }
    function openEventSheet(idx) { _eventSheet = idx; _eventReport = false; render(); }
    function openEventReport() { _eventReport = true; render(); }
    function selectEventReport(r) { _eventReportSelected = r; render(); }
    function submitEventReport() { navigate('events'); }

    function eventDetailOverlay() {
      if (_eventReport) {
        const okBtn = _eventReportSelected
          ? 'background:#ACDEF7;color:#2C0005;cursor:pointer;'
          : 'background:#E4E2E2;color:#94a3b8;cursor:default;';
        const reasons = ['Неправдива інформація','Небезпечний контент','Спам','Дискримінація','Інше'];
        const reasonsHTML = reasons.map(r => {
          const sel = _eventReportSelected === r;
          return `<div onclick="selectEventReport('${r.replace(/'/g,"&#39;")}')"
            style="border:1px solid ${sel?'#ACDEF7':'#e2e8f0'};background:${sel?'#F4FAFE':'#fff'};
                   border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;
                   font-size:13px;font-weight:700;color:#1C1A1A;">${r}</div>`;
        }).join('');
        return `
          <div style="position:absolute;inset:0;z-index:101;background:#fff;border-radius:20px;
                      padding:20px;overflow-y:auto;font-family:var(--font-font-family-Montserrat);">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <span style="font-size:16px;font-weight:800;color:#1C1A1A;">Поскаржитись на подію</span>
              <button onclick="closeEventSheet()"
                style="width:28px;height:28px;border-radius:50%;background:#f1f5f9;border:none;
                       cursor:pointer;display:flex;align-items:center;justify-content:center;">

            ${reasonsHTML}
            <button onclick="${_eventReportSelected?'submitEventReport()':''}"
              style="width:100%;border:none;border-radius:14px;padding:11px;font-weight:700;
                     font-size:14px;margin-top:8px;font-family:var(--font-font-family-Montserrat);
                     ${okBtn}">
              Надіслати скаргу
            </button>
          </div>`;
      }
      if (_eventSheet !== null) {
        const sheetOpts = [
          { icon:'bookmark',       label:'Зберегти подію',  color:'#1C1A1A', action:'closeEventSheet()' },
          { icon:'eye-off',        label:'Сховати подію',   color:'#1C1A1A', action:'closeEventSheet()' },
          { icon:'alert-triangle', label:'Поскаржитись',    color:'#ef4444', action:'openEventReport()' },
        ];
        const optsHTML = sheetOpts.map((o, i) => `
          <div onclick="${o.action}"
            style="display:flex;align-items:center;gap:12px;padding:12px 0;cursor:pointer;
                   ${i < sheetOpts.length-1 ? 'border-bottom:1px solid #f1f5f9;' : ''}">
            <i data-lucide="${o.icon}" style="width:18px;height:18px;color:${o.color};flex-shrink:0;"></i>
            <span style="font-size:14px;font-weight:600;color:${o.color};">${o.label}</span>
          </div>`).join('');
        return `
          <div onclick="closeEventSheet()"
            style="position:absolute;inset:0;z-index:99;background:rgba(0,0,0,0.3);"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;z-index:100;background:#fff;
                      border-radius:20px 20px 0 0;padding:20px;box-shadow:0 -4px 20px rgba(0,0,0,0.1);
                      font-family:var(--font-font-family-Montserrat);">
            <div style="width:40px;height:4px;background:#e2e8f0;border-radius:99px;margin:0 auto 16px;"></div>
            ${optsHTML}
          </div>`;
      }
      return '';
    }

    function renderEventDetail() {

        <div style="position:absolute;inset:0;display:flex;flex-direction:column;font-family:var(--font-font-family-Montserrat);">

          <!-- Hero image with overlaid back + panic buttons (flex-shrink:0) -->
          <div style="position:relative;flex-shrink:0;height:200px;">

              justify-content:center;z-index:20;">
              <i data-lucide="alert-triangle" style="width:14px;height:14px;color:white;"></i>
            </button>
          </div>

                             font-size:8px;font-weight:800;">${ev.cat}</span>

                             font-size:8px;font-weight:600;">${ev.format}</span>

                style="background:none;border:none;cursor:pointer;padding:2px;color:#94a3b8;
                       display:flex;align-items:center;justify-content:center;flex-shrink:0;">

            </div>

              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <i data-lucide="calendar" style="width:14px;height:14px;color:#387C96;flex-shrink:0;"></i>

              <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                <i data-lucide="map-pin" style="width:14px;height:14px;color:#387C96;flex-shrink:0;"></i>
                <span style="font-size:12px;font-weight:600;color:#374151;">${ev.location}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <i data-lucide="users" style="width:14px;height:14px;color:#387C96;flex-shrink:0;"></i>
                <span style="font-size:12px;font-weight:600;color:#374151;">Очікується ${ev.attendees} учасників</span>
              </div>
            </div>

            <div style="height:1px;background:#f1f5f9;margin:14px 0;"></div>

            <div style="font-size:14px;font-weight:800;color:#1C1A1A;margin-bottom:8px;">Про подію</div>
            <p style="font-size:12px;color:#5A6372;line-height:1.6;margin:0;">${ev.desc}</p>

            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;">
              ${ev.tags.map(t=>`<span style="background:#EDF1F4;color:#5A6372;border-radius:99px;
                padding:4px 10px;font-size:10px;font-weight:600;">${t}</span>`).join('')}
            </div>

            <div style="display:flex;align-items:center;gap:10px;margin-top:14px;">
              <div style="width:36px;height:36px;border-radius:50%;background:#ACDEF7;flex-shrink:0;
                          display:flex;align-items:center;justify-content:center;
                          font-size:14px;font-weight:800;color:#2C0005;">Q</div>
              <div>
                <div style="font-size:10px;color:#94a3b8;">Організатор</div>
                <div style="font-size:12px;font-weight:700;color:#1C1A1A;">${ev.org}</div>
              </div>
            </div>
          </div>

          <!-- Fixed bottom register button -->

            padding:12px 16px 20px;">

              border-bottom:2px solid #82CBEF;border-radius:14px;padding:13px;

    screens['event-detail'] = renderEventDetail;

    function showRegistrationForm() {
      const overlay = document.createElement('div');
      overlay.id = 'reg-overlay';
      overlay.style.cssText = 'position:absolute;inset:0;z-index:200;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;';
      overlay.innerHTML = `
        <div style="background:white;border-radius:20px 20px 0 0;
          padding:20px 16px 32px;width:100%;max-height:90%;">

          <div style="width:40px;height:4px;background:#e2e8f0;border-radius:99px;
            margin:0 auto 16px;"></div>

          <div style="font-size:18px;font-weight:800;color:#1C1A1A;margin-bottom:4px;">
            Реєстрація на подію
          </div>
          <div style="font-size:12px;color:#5A6372;margin-bottom:20px;">
            Квір-кіно клуб у Львові • 31 травня, 18:00
          </div>

                style="width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;

                box-sizing:border-box;">
            </div>

            <div>
              <label style="font-size:12px;font-weight:700;color:#1C1A1A;display:block;margin-bottom:4px;">Email або телефон</label>
              <input id="ev-contact" placeholder="Для підтвердження реєстрації"
                style="width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;
                padding:11px 14px;font-size:13px;font-family:Montserrat,sans-serif;outline:none;
                box-sizing:border-box;">
            </div>

            <div>
              <label style="font-size:12px;font-weight:700;color:#1C1A1A;display:block;margin-bottom:6px;">Кількість місць</label>
              <div style="display:flex;gap:8px;">
                <button onclick="selectTickets(1)" id="tickets-1"
                  style="flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;
                  cursor:pointer;font-family:Montserrat,sans-serif;
                  background:#ACDEF7;color:#2C0005;border:2px solid #82CBEF;">
                  1
                </button>
                <button onclick="selectTickets(2)" id="tickets-2"
                  style="flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;
                  cursor:pointer;font-family:Montserrat,sans-serif;
                  background:white;color:#64748b;border:1px solid #e2e8f0;">
                  2
                </button>
                <button onclick="selectTickets(3)" id="tickets-3"
                  style="flex:1;padding:10px;border-radius:12px;font-size:13px;font-weight:700;
                  cursor:pointer;font-family:Montserrat,sans-serif;
                  background:white;color:#64748b;border:1px solid #e2e8f0;">
                  3
                </button>
              </div>
            </div>

            <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;
              padding:10px 12px;display:flex;align-items:center;gap:8px;">
              <i data-lucide="shield-check" style="width:16px;height:16px;color:#16a34a;flex-shrink:0;"></i>

    function selectTickets(n) {
      window.selectedTickets = n;
      [1,2,3].forEach(i => {
        const btn = document.getElementById('tickets-'+i);
        if(!btn) return;
        if(i === n) {
          btn.style.background = '#ACDEF7';
          btn.style.color = '#2C0005';
          btn.style.border = '2px solid #82CBEF';
        } else {
          btn.style.background = 'white';
          btn.style.color = '#64748b';
          btn.style.border = '1px solid #e2e8f0';
        }
      });
    }

    function toggleSwitch(btn) {
      const isOn = btn.dataset.on === 'true';
      btn.dataset.on = !isOn;
      btn.style.background = !isOn ? '#5CC2E9' : '#E4E2E2';
      const thumb = btn.querySelector('div');
      if(thumb) thumb.style.transform = !isOn ? 'translateX(18px)' : 'translateX(0)';
    }

    function selectIcon(mode) {
      ['original','weather','notes'].forEach(m => {
        const card = document.getElementById('icon-'+m);
        const radio = document.getElementById('radio-icon-'+m);
        if(!card) return;
        if(m === mode) {
          card.style.borderColor = '#ACDEF7';
          card.style.background = '#F4FAFE';
          radio.style.borderColor = '#5CC2E9';
          radio.style.background = '#5CC2E9';
          radio.innerHTML = '';
        } else {
          card.style.borderColor = 'transparent';
          card.style.background = 'white';
          radio.style.borderColor = '#e2e8f0';
          radio.style.background = 'transparent';
          radio.innerHTML = '';
        }
      });
      window.iconMode = mode;
    }

    function selectCity(btn, city) {
      window.selectedCity = city;
      const buttons = document.querySelectorAll('[data-city-filter-btn]');
      buttons.forEach(b => {
        const isActive = b.textContent.trim() === city;
        b.style.background = isActive ? '#1C1A1A' : 'white';
        b.style.color = isActive ? 'white' : '#64748b';
        b.style.border = isActive ? 'none' : '1px solid #e2e8f0';
      });
      render();
    }

    // 'article-quiz' has its own inline panic in the header; suppress slot to avoid duplicate
    const NO_PANIC = new Set(['welcome','identity','register','login','security','panic','article-quiz']);

    function render() {
      // Clear stale nav and panic before every screen
      const navSlot   = document.getElementById('nav-slot');
      const panicSlot = document.getElementById('panic-slot');
      if (navSlot)   navSlot.innerHTML   = '';
      if (panicSlot) panicSlot.innerHTML = '';

      const fn = screens[currentScreen];
      document.getElementById('app').innerHTML = fn
        ? fn()
        : `<div style="padding:40px 16px;color:#2C0005;font-weight:700;">
             Screen "${currentScreen}" not yet implemented.
           </div>`;

      // Populate panic-slot for non-onboarding screens
      if (panicSlot && !NO_PANIC.has(currentScreen)) {
        panicSlot.innerHTML = PANIC_BTN_HTML;
        lucide.createIcons({ rootElement: panicSlot });
      }

      // Dedup: if any screen rendered an inline panic button, remove extras
      const panics = document.querySelectorAll('.panic-btn');
      if (panics.length > 1) {
        for (let i = 1; i < panics.length; i++) panics[i].remove();
      }

      lucide.createIcons();

      // Restore form state from cache
      const newInputs = document.querySelectorAll('#app input, #app textarea');
      newInputs.forEach(el => {
        if(el.id && window.formCache && window.formCache[el.id]) {
          el.value = window.formCache[el.id];
        }
      });

      // Attach register form listeners (only if on register screen)
      const nameInput = document.getElementById('reg-name');
      if (nameInput) {
        const emailInput = document.getElementById('reg-email');
        const passInput = document.getElementById('reg-pass');
        const checkbox = document.getElementById('reg-checkbox');
        const submitBtn = document.getElementById('reg-submit');

        function checkFormValidity() {
          window._regVals = window._regVals || { name:'', email:'', pass:'', agreed:false };
          const valid = nameInput.value.trim() !== '' &&
                        emailInput.value.trim() !== '' &&
                        passInput.value.trim().length >= 8 &&
                        checkbox.checked;
          submitBtn.style.background = valid ? '#ACDEF7' : '#E4E2E2';
          submitBtn.style.color = valid ? '#2C0005' : '#8E8E93';
          submitBtn.style.borderBottom = valid ? '2px solid #82CBEF' : 'none';
          submitBtn.style.cursor = valid ? 'pointer' : 'not-allowed';
          submitBtn.disabled = !valid;
        }

        nameInput.addEventListener('input', (e) => {
          window._regVals.name = e.target.value;
          checkFormValidity();
        });
        emailInput.addEventListener('input', (e) => {
          window._regVals.email = e.target.value;
          checkFormValidity();
        });
        passInput.addEventListener('input', (e) => {
          window._regVals.pass = e.target.value;
          checkFormValidity();
        });
        checkbox.addEventListener('change', (e) => {
          window._regVals.agreed = e.target.checked;
          checkFormValidity();
        });

        submitBtn.addEventListener('click', () => {
          if (!submitBtn.disabled) {
            window.userMode = 'open';
            navigate('security');
          }
        });

        checkFormValidity();
      }

      // Attach login form listeners (only if on login screen)
      const loginEmailEl = document.getElementById('login-email');
      if (loginEmailEl) {
        const loginPassEl = document.getElementById('login-pass');
        const loginSubmitEl = document.getElementById('login-submit');

        function checkLogin() {
          window._loginVals = window._loginVals || { email:'', pass:'' };
          const ok = loginEmailEl.value.trim() !== '' && loginPassEl.value.trim() !== '';
          loginSubmitEl.style.background = ok ? '#ACDEF7' : '#E4E2E2';
          loginSubmitEl.style.color = ok ? '#2C0005' : '#8E8E93';
          loginSubmitEl.style.borderBottom = ok ? '2px solid #82CBEF' : 'none';
          loginSubmitEl.disabled = !ok;
        }

        loginEmailEl.addEventListener('input', (e) => {
          window._loginVals.email = e.target.value;
          checkLogin();
        });
        loginEmailEl.addEventListener('focus', (e) => {
          e.target.style.borderColor = '#ACDEF7';
        });
        loginEmailEl.addEventListener('blur', (e) => {
          e.target.style.borderColor = '#e2e8f0';
        });

        loginPassEl.addEventListener('input', (e) => {
          window._loginVals.pass = e.target.value;
          checkLogin();
        });
        loginPassEl.addEventListener('focus', (e) => {
          e.target.style.borderColor = '#ACDEF7';
        });
        loginPassEl.addEventListener('blur', (e) => {
          e.target.style.borderColor = '#e2e8f0';
        });

        loginSubmitEl.addEventListener('click', () => {
          if (!loginSubmitEl.disabled) {
            window.userMode = 'open';
            navigate('security');
          }
        });

        checkLogin();
      }

      // Attach edit profile form listeners
      const editNameEl = document.getElementById('edit-name');
      if (editNameEl) {
        const editUsernameEl = document.getElementById('edit-username');

        editNameEl.addEventListener('input', (e) => {
          _profileEditVals.name = e.target.value;
        });
        editNameEl.addEventListener('focus', (e) => {
          e.target.style.borderColor = '#ACDEF7';
        });
        editNameEl.addEventListener('blur', (e) => {
          e.target.style.borderColor = '#e2e8f0';
        });

        editUsernameEl.addEventListener('input', (e) => {
          _profileEditVals.username = e.target.value;
        });
        editUsernameEl.addEventListener('focus', (e) => {
          e.target.style.borderColor = '#ACDEF7';
        });
        editUsernameEl.addEventListener('blur', (e) => {
          e.target.style.borderColor = '#e2e8f0';
        });
      }

      // Attach new post textarea listener
      const postTextEl = document.getElementById('post-text');
      if(postTextEl) {
        postTextEl.addEventListener('input', () => {});
      }

      // Attach new event form listeners
      ['event-name','event-title','event-desc','event-date','event-time','event-place'].forEach(id => {
        const el = document.getElementById(id);
        if(el) {
          const key = id.replace('event-', '');
          el.addEventListener('input', (e) => {
            window._newEvVals[key] = e.target.value;
          });
          el.addEventListener('focus', (e) => {
            e.target.style.borderColor = '#ACDEF7';
          });
          el.addEventListener('blur', (e) => {
            e.target.style.borderColor = '#e2e8f0';
          });
        }
      });

      // Attach messages search listener
      const messagesSearch = document.getElementById('search-messages');
      if (messagesSearch) {
        messagesSearch.addEventListener('focus', () => {
          messagesSearch.style.border = '1px solid #ACDEF7';
          messagesSearch.style.boxShadow = '0 0 0 3px rgba(172,222,247,0.3)';
        });
        messagesSearch.addEventListener('blur', () => {
          messagesSearch.style.border = '1px solid #e2e8f0';
          messagesSearch.style.boxShadow = 'none';
        });
        const MESSAGES_ITEMS = [
          {name:'Квір Спільнота', preview:'Всі разом — ми сильніші!', time:'09:41', bg:'#C097F2'},
          {name:'Андрій К.', preview:'Побачимось на заході?', time:'вчора', bg:'#5CC2E9'},
          {name:'Сапфо Клуб', preview:'Новий матеріал додано', time:'вчора', bg:'#FF9744'},
          {name:'Підтримка', preview:'Ми завжди поруч 💙', time:'2 дні', bg:'#AEDA3F'}
        ];
        const originalHTML = MESSAGES_ITEMS.map(i => `
          <div style="background:#fff;border-radius:16px;border:1px solid #E4E2E2;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;">
            <div style="width:44px;height:44px;border-radius:50%;background:${i.bg};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#2C0005;flex-shrink:0;">${i.name.charAt(0)}</div>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
                <div style="font-size:13px;font-weight:700;color:#1C1A1A;">${i.name}</div>
                <div style="font-size:9px;color:#94a3b8;font-weight:600;">${i.time}</div>
              </div>
              <div style="font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.preview}</div>
            </div>
          </div>`).join('');

        messagesSearch.addEventListener('input', function() {
          const val = this.value.trim();
          const container = document.getElementById('search-results-messages');
          if (val === '') {
            container.innerHTML = originalHTML;
          } else {
            const filtered = MESSAGES_ITEMS.filter(i =>
              i.name.toLowerCase().includes(val.toLowerCase()) ||
              i.preview.toLowerCase().includes(val.toLowerCase())
            );
            if (filtered.length === 0) {
              container.innerHTML = `<div style="text-align:center;padding:40px 0;">
                <img src="пошук не дав результатів.webp" style="width:200px;display:block;margin:0 auto 16px;object-fit:contain;">
                <div style="font-size:15px;font-weight:800;color:#1C1A1A;">Пошук не дав результатів</div>
                <div style="font-size:11px;color:#5A6372;margin-top:6px;max-width:200px;margin-left:auto;margin-right:auto;">Спробуйте інший запит</div>
              </div>`;
            } else {
              container.innerHTML = filtered.map(i => `
                <div style="background:#fff;border-radius:16px;border:1px solid #E4E2E2;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;">
                  <div style="width:44px;height:44px;border-radius:50%;background:${i.bg};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#2C0005;flex-shrink:0;">${i.name.charAt(0)}</div>
                  <div style="flex:1;min-width:0;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;">
                      <div style="font-size:13px;font-weight:700;color:#1C1A1A;">${i.name}</div>
                      <div style="font-size:9px;color:#94a3b8;font-weight:600;">${i.time}</div>
                    </div>
                    <div style="font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.preview}</div>
                  </div>
                </div>`).join('');
            }
            lucide.createIcons();
          }
        });
      }

      // Attach notifications search listener
      const notifsSearch = document.getElementById('search-notifications');
      if (notifsSearch) {
        const notifCard = (n) => `
          <div style="background:#fff;border-radius:16px;border:1px solid #E4E2E2;padding:11px 13px;display:flex;gap:10px;margin-bottom:8px;">
            <div style="width:8px;height:8px;border-radius:50%;background:${n.dot};flex-shrink:0;margin-top:4px;"></div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;font-weight:700;color:#1C1A1A;">${n.title}</div>
              <div style="font-size:10px;color:#5A6372;line-height:1.4;margin-top:2px;">${n.body}</div>
              <div style="font-size:9px;color:#94a3b8;margin-top:3px;">${n.time}</div>
            </div>
            ${n.unread ? `<div style="width:6px;height:6px;border-radius:50%;background:#ACDEF7;flex-shrink:0;margin-top:4px;"></div>` : ''}
          </div>`;

        notifsSearch.addEventListener('input', function() {
          const val = this.value.trim();
          const container = document.getElementById('search-results-notifications');
          if (val === '') {
            window._notifSearch = '';
            const filtered = NOTIFICATIONS.filter(n =>
              n.title.toLowerCase().includes('') ||
              n.body.toLowerCase().includes('')
            );
            const today = filtered.filter(n => n.section === 'today');
            const earlier = filtered.filter(n => n.section === 'earlier');
            let content = '';
            if (today.length > 0) {
              content += `<div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px 4px;">Сьогодні</div>`;
              content += today.map(notifCard).join('');
            }
            if (earlier.length > 0) {
              if (today.length > 0) content += `<div style="height:4px;"></div>`;
              content += `<div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px 4px;">Раніше</div>`;
              content += earlier.map(notifCard).join('');
            }
            container.innerHTML = content;
          } else {
            window._notifSearch = val;
            const filtered = NOTIFICATIONS.filter(n =>
              n.title.toLowerCase().includes(val.toLowerCase()) ||
              n.body.toLowerCase().includes(val.toLowerCase())
            );
            if (filtered.length === 0) {
              container.innerHTML = `<div style="text-align:center;padding:40px 0;">
                <img src="пошук не дав результатів.webp" style="width:200px;display:block;margin:0 auto 16px;object-fit:contain;">
                <div style="font-size:15px;font-weight:800;color:#1C1A1A;">Пошук не дав результатів</div>
                <div style="font-size:11px;color:#5A6372;margin-top:6px;max-width:200px;margin-left:auto;margin-right:auto;">Спробуйте інший запит</div>
              </div>`;
            } else {
              const today = filtered.filter(n => n.section === 'today');
              const earlier = filtered.filter(n => n.section === 'earlier');
              let content = '';
              if (today.length > 0) {
                content += `<div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px 4px;">Сьогодні</div>`;
                content += today.map(notifCard).join('');
              }
              if (earlier.length > 0) {
                if (today.length > 0) content += `<div style="height:4px;"></div>`;
                content += `<div style="font-size:9px;font-weight:800;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin:0 0 8px 4px;">Раніше</div>`;
                content += earlier.map(notifCard).join('');
              }
              container.innerHTML = content;
            }
            lucide.createIcons();
          }
        });
      }

      // Handle avatar image loading
      const profileImg = document.getElementById('profile-avatar-img');
      const profileIcon = document.getElementById('profile-avatar-icon');
      const editImg = document.getElementById('edit-avatar-img');
      const editIcon = document.getElementById('edit-avatar-icon');

      if (profileImg) {
        profileImg.onload = () => {
          profileImg.style.display = 'block';
          if (profileIcon) profileIcon.style.display = 'none';
        };
        profileImg.onerror = () => {
          profileImg.style.display = 'none';
          if (profileIcon) profileIcon.style.display = 'block';
        };
      }

      if (editImg) {
        editImg.onload = () => {
          editImg.style.display = 'block';
          if (editIcon) editIcon.style.display = 'none';
        };
        editImg.onerror = () => {
          editImg.style.display = 'none';
          if (editIcon) editIcon.style.display = 'block';
        };
      }

      // Auto-scroll chat to latest message
      if (currentScreen === 'chat-detail') {
        setTimeout(() => { const f = document.getElementById('chat-feed'); if (f) f.scrollTop = f.scrollHeight; }, 0);
      }
    }

    /* ── Helpers called from inline handlers ─────────────────────────────────── */
    function selectMode(mode) {
      selectedMode = mode;
      render();   // re-render to update selected state
    }

    /* ── Boot ────────────────────────────────────────────────────────────────── */
    render();
  </script>
</body>
</html>
